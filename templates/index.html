<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classification Mental Health</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #66bb6a, #388e3c); /* Gradient green background */
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: #ffffff; /* White background for the content box */
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 450px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: scale(1.05); /* Slightly scale up the container on hover */
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2); /* Enhance the shadow effect */
        }

        h1 {
            color: #388e3c;
            font-size: 2em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: left;
            color: #388e3c;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #66bb6a;
            border-radius: 8px;
            resize: none;
            font-size: 1em;
            transition: border-color 0.3s ease;
            background-color: #f9f9f9;
        }

        textarea:focus {
            border-color: #388e3c; /* Darker green border on focus */
            outline: none;
            background-color: #fff;
        }

        button {
            background-color: #66bb6a;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #388e3c;
            transform: translateY(-2px); /* Button raises on hover */
        }

        button:active {
            background-color: #2c6f2f;
            transform: translateY(0); /* Button returns to normal on click */
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #388e3c;
            border-radius: 8px;
            color: white;
            font-size: 1.2em;
            display: none;
            text-align: center;
        }

        .error {
            background-color: #e57373;
        }

        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Container utama aplikasi -->
    <div class="container">
        <!-- Judul aplikasi -->
        <h1>Classification Mental Health</h1>

        <!-- Formulir untuk memasukkan teks yang akan diprediksi -->
        <form id="predictForm">
            <!-- Textarea untuk memasukkan teks -->
            <textarea name="text" id="text" rows="4" placeholder="Write your text here..."></textarea>
            <br><br>
            <!-- Tombol untuk mengirimkan formulir -->
            <button type="submit">Prediction</button>
        </form>

        <!-- Div untuk menampilkan hasil prediksi -->
        <div id="predictionResult" class="result">
            <!-- Hasil prediksi akan ditampilkan di sini -->
        </div>
    </div>

    <script>
        // Menambahkan event listener saat formulir disubmit
        document.getElementById("predictForm").addEventListener("submit", function(event) {
            event.preventDefault();  // Mencegah pengiriman formulir secara tradisional

            // Mengambil nilai input dari textarea
            const inputText = document.getElementById("text").value;
            const resultDiv = document.getElementById("predictionResult");

            // Menghapus hasil sebelumnya
            resultDiv.style.display = "none";  // Menyembunyikan div hasil
            resultDiv.classList.remove("error");  // Menghapus kelas error jika ada

            // Jika teks kosong, tampilkan pesan error
            if (inputText.trim() === "") {
                resultDiv.textContent = "Teks tidak boleh kosong!";
                resultDiv.classList.add("error");
                resultDiv.style.display = "block";  // Menampilkan hasil error
                return;
            }

            // Membuat permintaan POST ke server Flask
            fetch("/predict", {
                method: "POST",  // Menggunakan metode POST
                body: new URLSearchParams({ text: inputText }),  // Mengirimkan teks yang dimasukkan
                headers: { "Content-Type": "application/x-www-form-urlencoded" }  // Menetapkan header untuk form-urlencoded
            })
            .then(response => response.json())  // Menunggu respon dalam format JSON
            .then(data => {
                // Jika ada error dari server, tampilkan pesan error
                if (data.error) {
                    resultDiv.textContent = data.error;
                    resultDiv.classList.add("error");
                } else {
                    // Jika prediksi berhasil, tampilkan hasilnya
                    resultDiv.textContent = " " + data.prediction;
                }
                resultDiv.style.display = "block";  // Menampilkan hasil
            })
            .catch(error => {
                // Menangani kesalahan jika permintaan gagal
                resultDiv.textContent = "Terjadi kesalahan: " + error.message;
                resultDiv.classList.add("error");
                resultDiv.style.display = "block";  // Menampilkan hasil error
            });
        });
    </script>
</body>
</html>
